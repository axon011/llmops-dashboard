name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

  jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: |
          cd frontend
          npm install
          npm run build
      - run: pip install -r requirements.txt
      - run: docker build -t llmops-dashboard-app .
      - run: docker run -d --name llmops-dashboard-app -p 8000:8000 --env-file .env llmops-dashboard-app
      - run: sleep 5
      - run: docker exec llmops-dashboard-app pytest tests/ -v
        env:
          OPENAI_API_KEY: dummy
          LANGFUSE_PUBLIC_KEY: dummy
          LANGFUSE_SECRET_KEY: dummy
          DATABASE_URL: postgresql+asyncpg://user:pass@localhost:5432/test
